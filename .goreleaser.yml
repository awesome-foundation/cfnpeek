version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: ./cmd/cfnpeek
    binary: cfnpeek
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "cfnpeek_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  disable: true

brews:
  - repository:
      owner: awesome-foundation
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/awesome-foundation/cfnpeek
    description: Read-only CLI for inspecting AWS CloudFormation stack resources, outputs, exports, and events
    license: MIT
    install: |
      bin.install "cfnpeek"
    test: |
      system bin/"cfnpeek", "--version"

release:
  github:
    owner: awesome-foundation
    name: cfnpeek
